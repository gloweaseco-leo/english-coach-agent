<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>English Coach Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="setupBanner" class="setup-banner hidden"></div>

    <aside class="sidebar">
      <div class="brand">
        <span class="mark">EC</span>
        <div>
          <h1>English Coach</h1>
          <p>v0.3 RAG Coach · 本地非商业学习工具</p>
        </div>
      </div>

      <section class="panel profile-panel">
        <h2>学习档案</h2>
        <label>
          水平
          <select id="level">
            <option>A1-A2</option>
            <option selected>B1</option>
            <option>B2</option>
            <option>C1+</option>
          </select>
        </label>
        <label>
          目标
          <input id="goal" value="提升听说读写综合能力" />
        </label>
        <label>
          每天分钟
          <input id="minutes" type="number" min="15" max="180" value="45" />
        </label>
        <fieldset class="weak-areas">
          <legend>薄弱项（多选）</legend>
          <label><input type="checkbox" name="weakArea" value="listening" /> 听力</label>
          <label><input type="checkbox" name="weakArea" value="speaking" /> 口语</label>
          <label><input type="checkbox" name="weakArea" value="vocabulary" /> 词汇</label>
          <label><input type="checkbox" name="weakArea" value="reading" /> 阅读</label>
          <label><input type="checkbox" name="weakArea" value="writing" /> 写作</label>
          <label><input type="checkbox" name="weakArea" value="ai" /> AI 辅助学习</label>
        </fieldset>
        <label>
          使用场景
          <select id="scenario">
            <option value="daily">日常提升</option>
            <option value="exam">考试</option>
            <option value="workplace">职场</option>
            <option value="abroad">出国</option>
            <option value="reading">阅读原版</option>
            <option value="speaking">口语交流</option>
          </select>
        </label>
        <button id="saveProfile">保存档案</button>
      </section>

      <section class="panel">
        <h2>章节</h2>
        <div id="chapters" class="chapter-list"></div>
      </section>
    </aside>

    <main class="workspace">
      <nav class="tabs">
        <button class="tab active" data-tab="coach">教练</button>
        <button class="tab" data-tab="plan">计划</button>
        <button class="tab" data-tab="practice">练习反馈</button>
        <button class="tab" data-tab="reader">阅读</button>
      </nav>

      <section id="coach" class="view active">
        <div id="coachMeta" class="coach-meta hidden"></div>
        <div id="providerWarning" class="provider-warning hidden"></div>
        <div id="todayCoach" class="today-card hidden"></div>
        <div class="hero">
          <div>
            <p class="eyebrow">Local Agent · v0.3</p>
            <h2>把教程变成每天可执行的训练闭环</h2>
          </div>
          <button id="quickPlan" class="needs-content">生成 14 天计划</button>
        </div>
        <section class="search-panel">
          <label>
            搜索章节（调试）
            <div class="search-row">
              <input id="searchQuery" type="text" placeholder="例如：listening 听力" />
              <button type="button" id="searchBtn" class="needs-content">搜索</button>
            </div>
          </label>
          <div id="searchResults" class="search-results"></div>
        </section>
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="composer">
          <textarea id="message" rows="3" placeholder="例如：我听力很差，如何用这份指南安排 30 天训练？"></textarea>
          <button type="submit">发送</button>
        </form>
      </section>

      <section id="plan" class="view">
        <div class="toolbar">
          <div>
            <h2>学习计划</h2>
            <p id="planOverview">还没有生成计划。</p>
          </div>
          <div class="inline-controls">
            <input id="days" type="number" min="3" max="90" value="14" />
            <button id="makePlan" class="needs-content">生成</button>
          </div>
        </div>
        <div id="planStats" class="plan-stats hidden">
          <div class="stat-block">
            <span class="stat-label">总进度</span>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <span id="progressText" class="stat-value">0%</span>
          </div>
          <div class="stat-block">
            <span class="stat-label">完成天数</span>
            <span id="statCompletedDays" class="stat-value">0</span>
          </div>
          <div class="stat-block">
            <span class="stat-label">连续学习</span>
            <span id="statStreak" class="stat-value">0 天</span>
          </div>
        </div>
        <div id="todayPlan" class="today-card hidden"></div>
        <div id="planList" class="plan-list"></div>
      </section>

      <section id="practice" class="view">
        <div class="toolbar">
          <div>
            <h2>练习反馈</h2>
            <p>贴作文、口语稿或复盘文本，获取结构化修订清单。</p>
          </div>
        </div>
        <input type="hidden" id="practiceTaskId" value="" />
        <div class="practice-grid">
          <label>
            类型
            <select id="practiceType">
              <option>作文</option>
              <option>口语稿</option>
              <option>学习复盘</option>
              <option>翻译练习</option>
            </select>
          </label>
          <label>
            重点
            <input id="practiceFocus" value="表达清晰度" />
          </label>
        </div>
        <textarea id="practiceText" rows="12" placeholder="Paste your English text here..."></textarea>
        <button id="reviewPractice">获取反馈</button>
        <div id="reviewStructured" class="review-structured hidden"></div>
        <pre id="reviewResult" class="result"></pre>
      </section>

      <section id="reader" class="view">
        <div id="readerRefBanner" class="ref-banner hidden"></div>
        <div class="toolbar">
          <div>
            <h2 id="readerTitle">阅读</h2>
            <p id="readerPath">选择左侧章节开始。</p>
          </div>
        </div>
        <article id="readerContent" class="reader-content"></article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
